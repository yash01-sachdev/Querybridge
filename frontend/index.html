<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nl-query-copilot</title>
    <style>
      :root {
        color-scheme: dark;
        background: #090909;
        color: #f6f2ea;
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(43, 92, 255, 0.16), transparent 34%),
          radial-gradient(circle at 80% 20%, rgba(36, 209, 107, 0.12), transparent 28%),
          #090909;
      }

      body {
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(43, 92, 255, 0.18), transparent 32%),
          radial-gradient(circle at 82% 18%, rgba(36, 209, 107, 0.14), transparent 24%),
          linear-gradient(180deg, rgba(18, 18, 20, 0.98), rgba(9, 9, 9, 0.99));
        transition: opacity 320ms ease, visibility 320ms ease;
      }

      #boot-splash.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .boot-shell {
        width: min(520px, 100%);
        padding: 40px 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        background: rgba(10, 10, 11, 0.92);
        box-shadow: 0 32px 90px rgba(0, 0, 0, 0.42);
        text-align: center;
      }

      .boot-orbit {
        position: relative;
        width: 132px;
        height: 132px;
        margin: 0 auto 24px;
      }

      .boot-core {
        position: absolute;
        inset: 31px;
        display: grid;
        place-items: center;
        border-radius: 24px;
        background: linear-gradient(135deg, rgba(242, 238, 231, 0.98), rgba(210, 223, 255, 0.95));
        color: #111111;
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -0.06em;
        box-shadow: 0 18px 50px rgba(47, 107, 255, 0.24);
        animation: boot-core-pulse 2.4s ease-in-out infinite;
      }

      .boot-ring {
        position: absolute;
        inset: 0;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }

      .boot-ring::before,
      .boot-ring::after {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 999px;
      }

      .boot-ring::before {
        top: 14px;
        left: 50%;
        margin-left: -7px;
        background: #2f6bff;
        box-shadow: 0 0 28px rgba(47, 107, 255, 0.75);
      }

      .boot-ring::after {
        right: 16px;
        bottom: 24px;
        background: #24d16b;
        box-shadow: 0 0 24px rgba(36, 209, 107, 0.68);
      }

      .boot-ring.outer {
        animation: boot-orbit-spin 3.4s linear infinite;
      }

      .boot-ring.inner {
        inset: 17px;
        animation: boot-orbit-spin-reverse 2.7s linear infinite;
      }

      .boot-ring.inner::before {
        top: auto;
        bottom: 9px;
        background: #a259ff;
        box-shadow: 0 0 24px rgba(162, 89, 255, 0.7);
      }

      .boot-ring.inner::after {
        right: auto;
        left: 14px;
        bottom: 46px;
        background: #f3c414;
        box-shadow: 0 0 22px rgba(243, 196, 20, 0.64);
      }

      .boot-title {
        margin: 0;
        font-size: clamp(2rem, 4vw, 2.7rem);
        font-weight: 800;
        letter-spacing: -0.06em;
      }

      .boot-copy {
        margin: 12px auto 0;
        max-width: 360px;
        color: rgba(246, 242, 234, 0.74);
        font-size: 1rem;
        line-height: 1.7;
      }

      .boot-status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 24px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        color: rgba(246, 242, 234, 0.88);
        font-size: 0.95rem;
      }

      .boot-status-dots {
        display: inline-flex;
        gap: 6px;
      }

      .boot-status-dots span {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #f2eee7;
        animation: boot-dot-bounce 1.05s ease-in-out infinite;
      }

      .boot-status-dots span:nth-child(2) {
        animation-delay: 120ms;
      }

      .boot-status-dots span:nth-child(3) {
        animation-delay: 240ms;
      }

      @keyframes boot-orbit-spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      @keyframes boot-orbit-spin-reverse {
        from {
          transform: rotate(360deg);
        }

        to {
          transform: rotate(0deg);
        }
      }

      @keyframes boot-core-pulse {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.05);
        }
      }

      @keyframes boot-dot-bounce {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.5;
        }

        50% {
          transform: translateY(-4px);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-shell">
        <div class="boot-orbit">
          <div class="boot-ring outer"></div>
          <div class="boot-ring inner"></div>
          <div class="boot-core">NL</div>
        </div>

        <h1 class="boot-title">Warming Up Query Bridge</h1>
        <p class="boot-copy">
          Loading the natural-language query workspace, syncing the UI shell, and getting ready to
          talk to your databases.
        </p>

        <div class="boot-status">
          <span class="boot-status-dots">
            <span></span>
            <span></span>
            <span></span>
          </span>
          Loading interface
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
